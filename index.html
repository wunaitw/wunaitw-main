<style>
:root{--sky:#EEF6FF;--cloud:#FFF;--sun:#FFD93D;--sun-dk:#E6A800;--grass:#52B788;--grass-dk:#2D6A4F;--coral:#FF6B6B;--coral-dk:#C0392B;--coral-lt:#FFF0F0;--lav:#9B72CF;--lav-lt:#F3ECFF;--ocean:#3AAEDC;--ocean-lt:#E3F6FF;--peach:#FF9A3C;--peach-lt:#FFF3E8;--mint:#1DB9AA;--mint-lt:#E3FAF8;--text:#222;--muted:#8A8A9A;--border:rgba(0,0,0,.07);--r:18px;--rsm:12px;--rxs:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--sky);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:90px;overflow-x:hidden}
.bg1{position:fixed;top:-80px;right:-80px;width:220px;height:220px;background:var(--sun);border-radius:50%;opacity:.18;z-index:0;pointer-events:none}
.bg2{position:fixed;bottom:80px;left:-60px;width:180px;height:180px;background:var(--grass);border-radius:50%;opacity:.10;z-index:0;pointer-events:none}
.hdr{background:var(--cloud);padding:13px 16px 11px;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--sun)}
.rainbow{height:4px;background:linear-gradient(90deg,#FF6B6B,#FFD93D 25%,#6BCB77 50%,#4CC9F0 75%,#C77DFF);border-radius:2px;margin-bottom:11px}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.logo-wrap{display:flex;align-items:center;gap:8px}
.logo-ball{width:72px;height:72px;border-radius:50%;overflow:hidden;flex-shrink:0;animation:wobble 4s ease-in-out infinite;background:transparent}
.logo-ball img{width:100%;height:100%;object-fit:contain;display:block}
@keyframes wobble{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
.app-name{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:var(--coral);letter-spacing:-.5px;line-height:1}
.app-name b{color:var(--ocean)}
.loc-pill{display:flex;align-items:center;gap:5px;background:var(--ocean-lt);border-radius:999px;padding:6px 12px;border:2px solid #b8e4f5;cursor:pointer}
.ldot{width:8px;height:8px;border-radius:50%;background:#ccc}
.ldot.on{background:var(--grass-dk);animation:blink 2s infinite}
.ldot.demo{background:var(--peach);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.lloc{font-size:11px;font-weight:800;font-family:'Nunito',sans-serif;color:#1a7fa8}
.fpanel{background:var(--cloud);margin:10px 12px 0;border-radius:var(--r);padding:13px 14px 11px;border:2px solid var(--border);box-shadow:0 4px 0 rgba(0,0,0,.05);position:relative;z-index:1}
.fsec{margin-bottom:11px}.fsec:last-child{margin-bottom:0}
.ftitle{font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;letter-spacing:.5px;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:5px;text-transform:uppercase}
.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 11px;border-radius:999px;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;border:2px solid var(--border);background:var(--sky);color:var(--muted);cursor:pointer;white-space:nowrap;user-select:none}
.chip:active{transform:scale(.92)}
.c-age{border-color:#d0aaff;color:var(--lav);background:var(--lav-lt)}.c-age.on{background:var(--lav);color:#fff;border-color:var(--lav)}
.c-free{border-color:#80d4b8;color:var(--grass-dk);background:var(--mint-lt)}.c-free.on{background:var(--grass);color:#fff;border-color:var(--grass)}
.c-low{border-color:#7fd4f0;color:#1a7fa8;background:var(--ocean-lt)}.c-low.on{background:var(--ocean);color:#fff;border-color:var(--ocean)}
.c-mid{border-color:#ffc090;color:#b85c00;background:var(--peach-lt)}.c-mid.on{background:var(--peach);color:#fff;border-color:var(--peach)}
.c-high{border-color:#ffb0b0;color:var(--coral-dk);background:var(--coral-lt)}.c-high.on{background:var(--coral);color:#fff;border-color:var(--coral)}
.c-reg{border-color:#ffb0b0;color:var(--coral-dk);background:var(--coral-lt)}.c-reg.on{background:var(--coral);color:#fff;border-color:var(--coral)}
.c-loc{border-color:#80d4b8;color:var(--grass-dk);background:var(--mint-lt)}.c-loc.on{background:var(--mint);color:#fff;border-color:var(--mint)}
.srow{display:flex;align-items:center;gap:8px}
.slbl{font-size:11px;color:var(--muted);white-space:nowrap}
.sval{font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;color:var(--coral);min-width:48px;text-align:right}
input[type=range]{flex:1;-webkit-appearance:none;height:5px;border-radius:3px;background:var(--sky);border:2px solid var(--border);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--coral);cursor:pointer;border:3px solid #fff}
.sbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 4px;position:relative;z-index:1}
.stxt{font-size:11px;color:var(--muted);font-weight:700;font-family:'Nunito',sans-serif}
.cnt{font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;background:var(--coral);color:#fff;padding:3px 11px;border-radius:999px}
.clist{padding:4px 12px 0;position:relative;z-index:1}
.acard{background:var(--cloud);border-radius:var(--r);margin-bottom:11px;border:2px solid var(--border);box-shadow:0 4px 0 rgba(0,0,0,.06);overflow:hidden;cursor:pointer;animation:popin .28s ease backwards}
@keyframes popin{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
.acard:active{transform:scale(.98)}
.cstripe{height:7px}
.cbody{padding:12px 14px 10px}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px}
.ctitle{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:var(--text);line-height:1.3;flex:1}
.dbub{font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;color:var(--ocean);background:var(--ocean-lt);padding:3px 10px;border-radius:999px;border:1.5px solid #b8e4f5;white-space:nowrap;flex-shrink:0}
.ctags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.tpill{font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;padding:2px 9px;border-radius:999px}
.tp-free{background:var(--mint-lt);color:var(--mint);border:1.5px solid #b2ede8}
.tp-paid{background:var(--peach-lt);color:var(--peach);border:1.5px solid #ffd6a8}
.tp-age{background:var(--lav-lt);color:var(--lav);border:1.5px solid #d8c0f8}
.tp-reg{background:var(--coral-lt);color:var(--coral);border:1.5px solid #ffb8b8}
.tp-date{background:var(--sky);color:var(--muted);border:1.5px solid var(--border)}
.tp-in{background:var(--ocean-lt);color:#1a7fa8;border:1.5px solid #b8e4f5}
.tp-out{background:var(--mint-lt);color:var(--grass-dk);border:1.5px solid #88d8c0}
.cfoot{display:flex;align-items:center;justify-content:space-between}
.caddr{font-size:11px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chev{width:16px;height:16px;color:var(--muted);transition:transform .22s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}
.cdet{border-top:2px dashed var(--sky);padding:12px 14px 14px;background:#FAFBFF;display:none}
.cdet.show{display:block;animation:slidedn .2s ease}
@keyframes slidedn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.drow{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.dico{font-size:14px;flex-shrink:0;line-height:1.6}
.dtxt{font-size:12px;color:var(--muted);line-height:1.65}
.dtxt strong{color:var(--text);font-weight:700}
.hbox{background:var(--lav-lt);border-left:4px solid var(--lav);border-radius:var(--rxs);padding:9px 11px;margin:10px 0 12px;font-size:12px;color:#5a3480;line-height:1.65}
.hbox strong{color:var(--lav)}
.abtns{display:flex;gap:8px;margin-top:12px}
.btngo{flex:1;padding:11px 0;text-align:center;background:var(--coral);color:#fff;border:none;border-radius:var(--rsm);font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;text-decoration:none;display:block;border-bottom:3px solid var(--coral-dk)}
.btnstar{padding:11px 13px;background:#fff;color:var(--muted);border:2px solid var(--border);border-bottom:3px solid var(--border);border-radius:var(--rsm);font-size:13px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer}
.btnstar.on{background:var(--sun);color:#7a5000;border-color:#e0b000;border-bottom-color:#b08000}
.swrap{background:var(--cloud);border-radius:var(--r);margin:14px 12px;padding:30px 22px;border:2px dashed var(--border);text-align:center;position:relative;z-index:1}
.semi{font-size:52px;display:block;margin-bottom:14px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.stitle{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;margin-bottom:8px}
.stext{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:22px}
.fbtn{display:block;width:100%;padding:13px;background:var(--coral);color:#fff;border:none;border-radius:var(--rsm);font-size:15px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;border-bottom:4px solid var(--coral-dk);margin-bottom:10px}
.fbtn.sec{background:#fff;color:var(--muted);border:2px solid var(--border);border-bottom:4px solid var(--border)}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--cloud);border-top:3px solid var(--border);display:flex;padding:6px 0 16px;z-index:200}.nbtn{flex:1;min-width:0}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--muted);padding:4px 0}
.nbtn.on{color:var(--coral)}
.nico{font-size:20px;line-height:1}
.nlbl{font-size:9px;font-weight:800}
.toast{position:fixed;bottom:95px;left:50%;transform:translateX(-50%) translateY(10px);background:#222;color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;opacity:0;transition:all .22s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

let uLat=null,uLng=null;
let radius=60,ageF='all',priceF='all',regF='all',envF='all',typeF='all',showAll=true,ivyF=false;
let expanded={},saved=JSON.parse(localStorage.getItem('kr3')||'[]'),tab='nearby';

function d2r(d){return d*Math.PI/180}
function gD(la1,lo1,la2,lo2){const dLa=d2r(la2-la1),dLo=d2r(lo2-lo1);const a=Math.sin(dLa/2)**2+Math.cos(d2r(la1))*Math.cos(d2r(la2))*Math.sin(dLo/2)**2;return 6371*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
function fD(km){return km<1?Math.round(km*1000)+' m':km.toFixed(1)+' km'}

function reqLoc(){
  if(!navigator.geolocation){toast('瀏覽器不支援定位 😅');return}
  sL('…');
  navigator.geolocation.getCurrentPosition(
    p=>{uLat=p.coords.latitude;uLng=p.coords.longitude;showAll=false;sL('on');render()},
    ()=>{sL('x');toast('請允許定位權限後重試 🔓')},
    {enableHighAccuracy:true,timeout:12000}
  );
}
function useDemo(){uLat=25.0123;uLng=121.4686;showAll=false;sL('demo');render()}
function sL(s){
  document.getElementById('ld').className='ldot'+(s==='on'?' on':s==='demo'?' demo':'');
  document.getElementById('lt').textContent={on:'定位成功',demo:'板橋示範','…':'定位中…',x:'定位失敗'}[s]||'開啟定位';
}

function tA(v){ageF=ageF===v?'all':v;render()}
function tP(v){priceF=priceF===v?'all':v;render()}
function tR(v){regF=regF===v?'all':v;render()}
function tE(v){envF=envF===v?'all':v;render()}
function tT(v){typeF=typeF===v?'all':v;render()}
function setRad(v){radius=parseInt(v);showAll=false;const el=document.getElementById('rv');if(el)el.textContent=radius+' km';const btn=document.getElementById('allBtn');if(btn)btn.classList.remove('on');render()}
function toggleIvy(){ivyF=!ivyF;render()}
function toggleAll(){showAll=!showAll;const btn=document.getElementById('allBtn');if(btn)btn.classList.toggle('on',showAll);render()}

function resetAll(){
  ageF='all';priceF='all';regF='all';envF='all';typeF='all';ivyF=false;showAll=false;radius=60;
  const rv=document.getElementById('rv');if(rv)rv.textContent='60 km';
  const allBtn=document.getElementById('allBtn');if(allBtn)allBtn.classList.remove('on');
  render();toast('✨ 已清除所有篩選條件！');
}
function applyF(arr){
  if(ageF!=='all'){const[lo,hi]=ageF.split('-').map(Number);arr=arr.filter(a=>a.lo<=lo&&a.hi>=hi)}
  if(priceF!=='all') arr=arr.filter(a=>a.pR===priceF);
  if(regF!=='all') arr=arr.filter(a=>a.region===regF);
  if(envF!=='all') arr=arr.filter(a=>a.env===envF);
  if(typeF!=='all') arr=arr.filter(a=>a.tags.some(t=>t.includes(typeF)));
  if(ivyF) arr=arr.filter(a=>a.ivyUrl);
  return arr;
}

function render(){
  if(tab==='saved'){rSaved();return}
  if(tab==='info'){rInfo();return}
  if(tab==='rest'){rRest();return}
  if(tab==='stay'){rStay();return}
  if(tab==='goods'){rComing('🛍️','育兒好物','Ivy精選好物推薦，含媽媽包、玩具、外出神器！');return}
  const mc=document.getElementById('mc');
  if(!uLat){
    // 隨機挑5個景點當推薦
    const picks=D.slice().sort(()=>Math.random()-0.5).slice(0,5);
    const pickHTML=picks.map(a=>{
      const pr=a.pR==='free'?'免費':'付費';
      return '<div style="background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:10px;border:2px solid var(--border);display:flex;align-items:center;gap:12px">'
        +'<span style="font-size:24px">'+a.emoji+'</span>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-family:Nunito,sans-serif;font-weight:900;font-size:14px;color:var(--text);margin-bottom:2px">'+a.name+'</div>'
        +'<div style="font-size:11px;color:var(--muted)">'+a.region+' · '+a.dates.slice(0,15)+'</div>'
        +'</div>'
        +'<span style="font-size:11px;color:var(--muted);white-space:nowrap">'+pr+'</span>'
        +'</div>';
    }).join('');
    mc.innerHTML=`
      <div style="padding:16px 12px 0">
        <div style="text-align:center;margin-bottom:16px">
          <span style="font-size:48px;display:block;margin-bottom:8px">📍</span>
          <div style="font-family:Nunito,sans-serif;font-weight:900;font-size:18px;color:var(--text);margin-bottom:6px">找你附近的親子活動！</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:14px">開啟定位後自動計算距離，由近到遠排序</div>
          <button class="fbtn" onclick="reqLoc()" style="width:100%;margin-bottom:8px">📍 開啟定位</button>
          <button class="fbtn sec" onclick="useDemo()" style="width:100%">🏠 板橋示範模式</button>
        </div>
        <div style="font-family:Nunito,sans-serif;font-weight:900;font-size:14px;color:var(--text);margin-bottom:10px">✨ 今日隨機推薦</div>
        ${pickHTML}
      </div>`;
    return}
  let items=showAll?D.map(a=>({...a,dist:gD(uLat,uLng,a.lat,a.lng)})):D.map(a=>({...a,dist:gD(uLat,uLng,a.lat,a.lng)})).filter(a=>a.dist<=radius);
  items=applyF(items);
  items.sort((a,b)=>a.dist-b.dist);
  mc.innerHTML=bF()+`<div class="sbar"><span class="stxt">📌 由近到遠</span><span class="cnt">找到 ${items.length} 個 🎯</span></div>`+
    (items.length?`<div class="clist">${items.map((a,i)=>bCard(a,i)).join('')}</div>`
    :`<div class="swrap"><span class="semi">🔍</span><div class="stitle">沒有符合的活動</div><div class="stext">試試調整篩選條件或把距離調大 😊</div></div>`);
}

  const resetBar=activeCount>0?`<div style="display:flex;align-items:center;justify-content:space-between;background:#fff3f3;border:2px solid #FF6B6B;border-radius:12px;padding:10px 14px;margin-bottom:12px"><span style="font-size:13px;color:#FF6B6B;font-weight:900">⚠️ 目前有 ${activeCount} 個篩選條件</span><button onclick="resetAll()" style="background:#FF6B6B;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:900;cursor:pointer">✕ 全部清除</button></div>`:'';

  const prices=[{v:'free',l:'免費 🎁',c:'c-free'},{v:'low',l:'$300以下',c:'c-low'},{v:'mid',l:'$300–500',c:'c-mid'},{v:'high',l:'$500+',c:'c-high'}];
  const regs=[{v:'台北市',l:'台北市'},{v:'新北市',l:'新北市'},{v:'桃園市',l:'桃園市'},{v:'基隆市',l:'基隆市'},{v:'新竹',l:'新竹'},{v:'苗栗',l:'苗栗'},{v:'宜蘭',l:'宜蘭'},{v:'台中市',l:'台中市'},{v:'南投縣',l:'南投'},{v:'彰化縣',l:'彰化'},{v:'台南市',l:'台南市'},{v:'高雄市',l:'高雄市'},{v:'屏東縣',l:'屏東'},{v:'花蓮縣',l:'花蓮'},{v:'嘉義縣',l:'嘉義'}];
  const envs=[{v:'indoor',l:'🏠 室內'},{v:'outdoor',l:'🌳 戶外'}];
  const types=[
    {v:'水族館',l:'🐠 水族館'},{v:'昆蟲館',l:'🐛 昆蟲館'},
    {v:'動物園',l:'🦁 動物園'},{v:'動物農場',l:'🐄 動物農場'},
    {v:'美術館',l:'🎨 美術館'},{v:'博物館',l:'🏺 博物館'},
    {v:'遊樂園',l:'🎡 遊樂園'},{v:'科學教育',l:'🔭 科學'},
    {v:'親子影城',l:'🎬 親子影城'},{v:'職業體驗',l:'👨‍🍳 職業體驗'},
    {v:'DIY體驗',l:'✂️ DIY手作'},{v:'圖書館',l:'📚 圖書館'},
    {v:'玩水',l:'💧 玩水戲水'},{v:'戶外',l:'🌳 戶外景點'},
  ];
  return `<div class="fpanel">${resetBar}
    <div class="fsec"><div class="ftitle"><div class="fdot" style="background:var(--lav)"></div>適合年齡</div>
    <div class="chips">${ages.map(g=>`<div class="chip c-age ${ageF===g.v?'on':''}" onclick="tA('${g.v}')">${g.l}</div>`).join('')}</div></div>
    <div class="fsec"><div class="ftitle"><div class="fdot" style="background:var(--mint)"></div>室內 / 戶外</div>
    <div class="chips">${envs.map(g=>`<div class="chip c-loc ${envF===g.v?'on':''}" onclick="tE('${g.v}')">${g.l}</div>`).join('')}</div></div>
    <div class="fsec"><div class="ftitle"><div class="fdot" style="background:var(--lav)"></div>景點類型</div>
    <div class="chips">${types.map(g=>`<div class="chip c-age ${typeF===g.v?'on':''}" onclick="tT('${g.v}')">${g.l}</div>`).join('')}</div></div>
    <div class="fsec"><div class="ftitle"><div class="fdot" style="background:var(--grass)"></div>票價區間</div>
    <div class="chips">${prices.map(g=>`<div class="chip ${g.c} ${priceF===g.v?'on':''}" onclick="tP('${g.v}')">${g.l}</div>`).join('')}</div></div>
    <div class="fsec"><div class="ftitle"><div class="fdot" style="background:var(--coral)"></div>地區</div>

function bCard(a,i){
  const isSaved=saved.includes(a.id),isOpen=expanded[a.id];
  const eCls=a.env==='indoor'?'tp-in':'tp-out',eLbl=a.env==='indoor'?'🏠 室內':'🌳 戶外';
  const tagH=a.tags.map(t=>{
    const c=t.includes('免費')?'tp-free':t.includes('付費')?'tp-paid':t.includes('歲')||t.includes('+')?'tp-age':t.includes('市')||t==='宜蘭'||t==='新竹'?'tp-reg':'tp-date';
    return `<span class="tpill ${c}">${t}</span>`;
  }).join('')+`<span class="tpill ${eCls}">${eLbl}</span>`;
  const det=isOpen?`<div class="cdet show" id="d${a.id}">
    <div class="drow"><span class="dico">📍</span><span class="dtxt">${a.addr}</span></div>
    <div class="drow"><span class="dico">📅</span><span class="dtxt"><strong>${a.dates}</strong></span></div>
    <div class="drow"><span class="dico">🕘</span><span class="dtxt">${a.hours}</span></div>
    <div class="drow"><span class="dico">🎫</span><span class="dtxt" style="white-space:pre-line">${a.ticket}</span></div>
    <div class="hbox"><strong>👶 0–8歲適合：</strong> ${a.note}</div>
    <div class="abtns">
      <a class="btngo" href="${a.url}" target="_blank" onclick="event.stopPropagation()">🔗 前往官網</a>
      <a class="btngo" style="background:var(--ocean);border-bottom-color:#1a7fa8" href="https://maps.google.com/?q=${encodeURIComponent(a.mQ)}" target="_blank" onclick="event.stopPropagation()">🗺️ 地圖</a>
      ${a.ivyUrl?`<a class="btngo" style="background:#FF69B4;border-bottom-color:#c44d8a" href="${a.ivyUrl}" target="_blank" onclick="event.stopPropagation()">🌸 Ivy分享</a>`:''}
      <button class="btnstar ${isSaved?'on':''}" onclick="tSv(event,${a.id})">${isSaved?'⭐':'☆'}</button>
    </div>
  </div>`:`<div class="cdet" id="d${a.id}"></div>`;
  return `<div class="acard" id="c${a.id}" style="animation-delay:${Math.min(i*55,280)}ms" onclick="tCard(${a.id})">
    <div class="cstripe" style="background:${a.color}"></div>
    <div class="cbody">
      <div class="ctop"><div class="ctitle">${a.emoji} ${a.name}</div><div class="dbub">${fD(a.dist)}</div></div>
      <div class="ctags">${tagH}</div>
      <div class="cfoot"><span class="caddr">${a.addr.slice(0,15)}…</span><svg class="chev ${isOpen?'open':''}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="4 6 8 10 12 6"/></svg></div>
    </div>${det}</div>`;
}

function tCard(id){expanded[id]=!expanded[id];render();if(expanded[id])setTimeout(()=>{const el=document.getElementById('c'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'})},60)}
function tSv(e,id){e.stopPropagation();if(saved.includes(id)){saved=saved.filter(s=>s!==id);toast('取消收藏 😢')}else{saved.push(id);toast('收藏成功！⭐')}localStorage.setItem('kr3',JSON.stringify(saved));render()}

function rSaved(){
  const mc=document.getElementById('mc');
  const items=D.filter(a=>saved.includes(a.id)).map(a=>({...a,dist:uLat?gD(uLat,uLng,a.lat,a.lng):0}));
  if(!items.length){mc.innerHTML=`<div class="swrap"><span class="semi">⭐</span><div class="stitle">還沒有收藏活動</div><div class="stext">展開活動卡片點「☆ 收藏」<br>就會出現在這裡 😊</div></div>`;return}
  mc.innerHTML=`<div class="sbar"><span class="stxt">⭐ 我的收藏</span><span class="cnt">${items.length} 個 🎯</span></div><div class="clist">${items.map((a,i)=>bCard(a,i)).join('')}</div>`;
}

let stayRegF='all', stayRadius=60, stayShowAll=true, stayIvyF=false;

function distH(a){if(!uLat)return 99999;return gD(uLat,uLng,a.lat,a.lng)}

function bStayCard(a){
  const dist=distH(a);
  const tags=a.tags.map(t=>'<span class="tpill tp-date">'+t+'</span>').join('');
  const distTxt=uLat?fD(dist):'📍';
  const mapUrl='https://maps.google.com/?q='+encodeURIComponent(a.name);
  const ivyBtn=a.ivyUrl?'<a class="btngo" style="background:#FF69B4;border-bottom-color:#c44d8a" href="'+a.ivyUrl+'" target="_blank">🌸 Ivy分享</a>':'';

    +'<div class="ctags">'+tags+'<span class="tpill tp-reg">'+a.region+'</span></div>'
    +'<div style="font-size:12px;color:var(--muted);margin:6px 0">'+a.addr.slice(0,25)+'…</div>'

function stayFilterHTML(){
  const regs=[{v:'all',l:'全部'},{v:'台北市',l:'台北市'},{v:'新北市',l:'新北市'},{v:'桃園市',l:'桃園市'},{v:'新竹',l:'新竹'},{v:'苗栗',l:'苗栗'},{v:'台中市',l:'台中市'}];

  const ivyOn=stayIvyF;

function rStay(){
  const mc=document.getElementById('mc');
  let items=H.slice();
  if(stayRegF!=='all') items=items.filter(a=>a.region===stayRegF);
  if(stayIvyF) items=items.filter(a=>a.ivyUrl);
  if(uLat && !stayShowAll){
    items=items.map(a=>({...a,dist:distH(a)})).filter(a=>a.dist<=stayRadius);
  } else if(uLat){
    items=items.map(a=>({...a,dist:distH(a)}));
  }
  if(uLat) items.sort((a,b)=>(a.dist||99999)-(b.dist||99999));
  mc.innerHTML=stayFilterHTML()
    +'<div class="sbar"><span class="stxt">🏨 親子住宿</span><span class="cnt">共 '+items.length+' 間 🎯</span></div>'
    +'<div style="padding:0 12px 8px;font-size:12px;color:var(--muted)">✅ 已收錄精選親子友善住宿，更多縣市陸續新增中！</div>'
    +'<div class="clist">'+items.map(a=>bStayCard(a)).join('')+'</div>';
}


function rRest(){
  const mc=document.getElementById('mc');
  let items=R.slice();

  // 地區篩選
  if(restRegF!=='all') items=items.filter(a=>a.region===restRegF);

  if(uLat && !restShowAll){
    items=items.map(a=>({...a,dist:distR(a)})).filter(a=>a.dist<=restRadius);

    items=items.map(a=>({...a,dist:distR(a)}));

  // 排序

function goTab(t){
  tab=t;
  ['nearby','rest','stay','goods','saved','info'].forEach(x=>{
    const el=document.getElementById('nb-'+x);
    if(el)el.className='nbtn'+(x===t?' on':'');
  });
  render();
}

function goBlog(){

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)}
render();
