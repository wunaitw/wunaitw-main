let uLat=null,uLng=null;
let radius=60,ageTier='all',ageF='all',priceF='all',regF='all',envF='all',typeF='all',showAll=true,ivyF=false;
let expanded={},saved=JSON.parse(localStorage.getItem('kr3')||'[]'),tab='nearby';

function d2r(d){return d*Math.PI/180}
function gD(la1,lo1,la2,lo2){const dLa=d2r(la2-la1),dLo=d2r(lo2-lo1);const a=Math.sin(dLa/2)**2+Math.cos(d2r(la1))*Math.cos(d2r(la2))*Math.sin(dLo/2)**2;return 6371*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
function fD(km){return km<1?Math.round(km*1000)+' m':km.toFixed(1)+' km'}

function reqLoc(){
  if(!navigator.geolocation){toast('瀏覽器不支援定位 😅');return}
  sL('…');
  navigator.geolocation.getCurrentPosition(
    p=>{uLat=p.coords.latitude;uLng=p.coords.longitude;showAll=false;sL('on');render()},
    ()=>{sL('x');toast('請允許定位權限後重試 🔓')},
    {enableHighAccuracy:true,timeout:12000}
  );
}
function useDemo(){uLat=25.0123;uLng=121.4686;showAll=false;sL('demo');render()}
function sL(s){
  document.getElementById('ld').className='ldot'+(s==='on'?' on':s==='demo'?' demo':'');
  document.getElementById('lt').textContent={on:'定位成功',demo:'板橋示範','…':'定位中…',x:'定位失敗'}[s]||'開啟定位';
}

function tA(v){ageF=ageF===v?'all':v;render()}
function tAT(v){ageTier=ageTier===v?'all':v;ageF='all';render()}
function tP(v){priceF=priceF===v?'all':v;render()}
function tR(v){regF=regF===v?'all':v;render()}
function tE(v){envF=envF===v?'all':v;render()}
function tT(v){typeF=typeF===v?'all':v;render()}
function setRad(v){radius=parseInt(v);showAll=false;const el=document.getElementById('rv');if(el)el.textContent=radius+' km';const btn=document.getElementById('allBtn');if(btn)btn.classList.remove('on');render()}
function toggleIvy(){ivyF=!ivyF;render()}
function toggleAll(){showAll=!showAll;const btn=document.getElementById('allBtn');if(btn)btn.classList.toggle('on',showAll);render()}

function resetAll(){
  ageTier='all';ageF='all';priceF='all';regF='all';envF='all';typeF='all';ivyF=false;showAll=false;radius=60;
  const rv=document.getElementById('rv');if(rv)rv.textContent='60 km';
  const allBtn=document.getElementById('allBtn');if(allBtn)allBtn.classList.remove('on');
  render();toast('✨ 已清除所有篩選條件！');
}
function applyF(arr){
  const olderTags=['水族館','美術館','博物館','遊樂園','科學教育','DIY體驗','圖書館','玩水','戶外景點'];
  if(ageTier==='young') arr=arr.filter(a=>a.lo<=3);
  if(ageTier==='older') arr=arr.filter(a=>a.lo>=4||a.tags.some(t=>olderTags.some(ot=>t.includes(ot))));
  if(ageF==='8+') arr=arr.filter(a=>a.lo>=4||a.tags.some(t=>olderTags.some(ot=>t.includes(ot))));
  else if(ageF!=='all'){const[lo,hi]=ageF.split('-').map(Number);arr=arr.filter(a=>a.lo<=lo&&a.hi>=hi)}
  if(priceF!=='all') arr=arr.filter(a=>a.pR===priceF);
  if(regF!=='all') arr=arr.filter(a=>a.region===regF);
  if(envF!=='all') arr=arr.filter(a=>a.env===envF);
  if(typeF!=='all') arr=arr.filter(a=>a.tags.some(t=>t.includes(typeF)));
  if(ivyF) arr=arr.filter(a=>a.ivyUrl);
  return arr;
}

function render(){
  if(tab==='saved'){rSaved();return}
  if(tab==='info'){rInfo();return}
  if(tab==='rest'){rRest();return}
  if(tab==='stay'){rStay();return}
  if(tab==='goods'){rComing('🛍️','育兒好物','Ivy精選好物推薦，含媽媽包、玩具、外出神器！');return}
  const mc=document.getElementById('mc');
  if(!uLat){
    // 隨機挑5個景點當推薦
    const picks=D.slice().sort(()=>Math.random()-0.5).slice(0,5);
    const pickHTML=picks.map(a=>{
      const pr=a.pR==='free'?'免費':'付費';
      return '<div style="background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:10px;border:2px solid var(--border);display:flex;align-items:center;gap:12px">'
        +'<span style="font-size:24px">'+a.emoji+'</span>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-family:Nunito,sans-serif;font-weight:900;font-size:14px;color:var(--text);margin-bottom:2px">'+a.name+'</div>'
        +'<div style="font-size:11px;color:var(--muted)">'+a.region+' · '+a.dates.slice(0,15)+'</div>'
        +'</div>'
        +'<span style="font-size:11px;color:var(--muted);white-space:nowrap">'+pr+'</span>'
        +'</div>';
    }).join('');
    mc.innerHTML=`
      <div style="padding:16px 12px 0">
        <div style="text-align:center;margin-bottom:16px">
          <span style="font-size:48px;display:block;margin-bottom:8px">📍</span>
          <div style="font-family:Nunito,sans-serif;font-weight:900;font-size:18px;color:var(--text);margin-bottom:6px">找你附近的親子活動！</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:14px">開啟定位後自動計算距離，由近到遠排序</div>
          <button class="fbtn" onclick="reqLoc()" style="width:100%;margin-bottom:8px">📍 開啟定位</button>

        </div>
        <div style="font-family:Nunito,sans-serif;font-weight:900;font-size:14px;color:var(--text);margin-bottom:10px">✨ 今日隨機推薦</div>
        ${pickHTML}
      </div>`;
    return}
  let items=showAll?D.map(a=>({...a,dist:gD(uLat,uLng,a.lat,a.lng)})):D.map(a=>({...a,dist:gD(uLat,uLng,a.lat,a.lng)})).filter(a=>a.dist<=radius);
  items=applyF(items);
  items.sort((a,b)=>a.dist-b.dist);
  mc.innerHTML=bF()+`<div class="sbar"><span class="stxt">📌 由近到遠</span><span class="cnt">找到 ${items.length} 個 🎯</span></div>`+
    (items.length?`<div class="clist">${items.map((a,i)=>bCard(a,i)).join('')}</div>`
    :`<div class="swrap"><span class="semi">🔍</span><div class="stitle">沒有符合的活動</div><div class="stext">試試調整篩選條件或把距離調大 😊</div></div>`);
}

  const resetBar=activeCount>0?`<div style="display:flex;align-items:center;justify-content:space-between;background:#fff3f3;border:2px solid #FF6B6B;border-radius:12px;padding:10px 14px;margin-bottom:12px"><span style="font-size:13px;color:#FF6B6B;font-weight:900">⚠️ 目前有 ${activeCount} 個篩選條件</span><button onclick="resetAll()" style="background:#FF6B6B;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:900;cursor:pointer">✕ 全部清除</button></div>`:'';

  return `<div class="fpanel">${resetBar}

function bCard(a,i){
  const isSaved=saved.includes(a.id),isOpen=expanded[a.id];
  const eCls=a.env==='indoor'?'tp-in':'tp-out',eLbl=a.env==='indoor'?'🏠 室內':'🌳 戶外';
  const tagH=a.tags.map(t=>{
    const c=t.includes('免費')?'tp-free':t.includes('付費')?'tp-paid':t.includes('歲')||t.includes('+')?'tp-age':t.includes('市')||t==='宜蘭'||t==='新竹'?'tp-reg':'tp-date';
    return `<span class="tpill ${c}">${t}</span>`;
  }).join('')+`<span class="tpill ${eCls}">${eLbl}</span>`;
  const det=isOpen?`<div class="cdet show" id="d${a.id}">
    <div class="drow"><span class="dico">📍</span><span class="dtxt">${a.addr}</span></div>
    <div class="drow"><span class="dico">📅</span><span class="dtxt"><strong>${a.dates}</strong></span></div>
    <div class="drow"><span class="dico">🕘</span><span class="dtxt">${a.hours}</span></div>
    <div class="drow"><span class="dico">🎫</span><span class="dtxt" style="white-space:pre-line">${a.ticket}</span></div>
    <div class="hbox"><strong>👶 0–8歲適合：</strong> ${a.note}</div>
    <div class="abtns">
      <a class="btngo" href="${a.url}" target="_blank" onclick="event.stopPropagation()">🔗 前往官網</a>
      <a class="btngo" style="background:var(--ocean);border-bottom-color:#1a7fa8" href="https://maps.google.com/?q=${encodeURIComponent(a.mQ)}" target="_blank" onclick="event.stopPropagation()">🗺️ 地圖</a>
      ${a.ivyUrl?`<a class="btngo" style="background:#FF69B4;border-bottom-color:#c44d8a" href="${a.ivyUrl}" target="_blank" onclick="event.stopPropagation()">🌸 Ivy分享</a>`:''}
      ${a.buyUrl?`<a class="btngo" style="background:#FF9A3C;border-bottom-color:#cc7a00" href="${a.buyUrl}" target="_blank" onclick="event.stopPropagation()">🎟️ 購票優惠</a>`:''}
      <button class="btnstar ${isSaved?'on':''}" onclick="tSv(event,${a.id})">${isSaved?'⭐':'☆'}</button>
    </div>
  </div>`:`<div class="cdet" id="d${a.id}"></div>`;
  return `<div class="acard" id="c${a.id}" style="animation-delay:${Math.min(i*55,280)}ms" onclick="tCard(${a.id})">
    <div class="cstripe" style="background:${a.color}"></div>
    <div class="cbody">

function rStay(){
  const mc=document.getElementById('mc');
  let items=H.slice();
  if(stayRegF!=='all') items=items.filter(a=>a.region===stayRegF);
  if(stayIvyF) items=items.filter(a=>a.ivyUrl);
  if(uLat && !stayShowAll){
    items=items.map(a=>({...a,dist:distH(a)})).filter(a=>a.dist<=stayRadius);
  } else if(uLat){
    items=items.map(a=>({...a,dist:distH(a)}));
  }
  if(uLat) items.sort((a,b)=>(a.dist||99999)-(b.dist||99999));
  mc.innerHTML=stayFilterHTML()
    +'<div class="sbar"><span class="stxt">🏨 親子住宿</span><span class="cnt">共 '+items.length+' 間 🎯</span></div>'
    +'<div style="padding:0 12px 8px;font-size:12px;color:var(--muted)">✅ 已收錄精選親子友善住宿，更多縣市陸續新增中！</div>'
    +'<div class="clist">'+items.map(a=>bStayCard(a)).join('')+'</div>';
}


function rRest(){
  const mc=document.getElementById('mc');
  let items=R.slice();

  // 地區篩選
  if(restRegF!=='all') items=items.filter(a=>a.region===restRegF);
  if(restIvyF) items=items.filter(a=>a.ivyUrl);

  // 距離篩選
  if(uLat && !restShowAll){
    items=items.map(a=>({...a,dist:distR(a)})).filter(a=>a.dist<=restRadius);
  } else if(uLat){
    items=items.map(a=>({...a,dist:distR(a)}));

  // 排序
  if(uLat) items.sort((a,b)=>(a.dist||99999)-(b.dist||99999));

  const filterHTML=rRestFilter();
